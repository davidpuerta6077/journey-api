<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOURNEY - Configuración</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    /* Estilos específicos para esta página */
    .status-card {
        transition: transform 0.2s;
        border: none;
        border-radius: 12px;
    }
    .status-card:hover {
        transform: translateY(-5px);
    }
    .status-indicator {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 8px;
    }
    .status-connected { background-color: #198754; box-shadow: 0 0 10px #198754; }
    .status-disconnected { background-color: #dc3545; }
    .status-warning { background-color: #ffc107; }
    
    .form-control:disabled {
        background-color: #f8f9fa;
        opacity: 0.7;
    }
    .token-timer-container {
        height: 8px;
        background: #e9ecef;
        border-radius: 4px;
        overflow: hidden;
        margin-top: 10px;
    }
    .token-bar {
        height: 100%;
        background: linear-gradient(90deg, #0d6efd, #0dcaf0);
        width: 0%; /* Se actualiza con JS */
        transition: width 1s linear;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-dark px-3">
    <button id="toggle-menu" class="btn btn-dark me-2"><i class="bi bi-list"></i></button>
    <span class="navbar-brand mb-0 h1">JOURNEY</span>
    <div class="user-menu">
      <div class="user-info" id="userDropdown">
        <span class="user-name"><i class="bi bi-person-circle"></i> Usuario</span>
        <i class="bi bi-chevron-down"></i>
      </div>
      <ul class="dropdown-menu" id="userMenu">
        <li><a href="#">Mi Perfil</a></li>
        <li><a href="#">Ver Logs</a></li>
        <li class="logout"><a href="#">Cerrar sesión</a></li>
      </ul>
    </div>
  </nav>

  <div class="d-flex">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <ul class="nav flex-column">
        <li><a href="index.html"><i class="bi bi-house"></i> <span>Home</span></a></li>
        <!-- ... otros items del menú ... -->
        <li><a href="configuracion.html" class="active"><i class="bi bi-gear"></i> <span>Configuración</span></a></li>
      </ul>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="content flex-grow-1 p-4 bg-light">
      <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h4>Estado del Sistema</h4>
            <p class="text-muted mb-0">Monitoreo de conexiones AWS Cognito y Moodle API</p>
          </div>
          <button class="btn btn-primary" onclick="refreshStatus()">
            <i class="bi bi-arrow-clockwise"></i> Actualizar Estado
          </button>
      </div>

      <!-- TARJETAS DE ESTADO -->
      <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="card status-card shadow-sm p-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h6 class="text-muted text-uppercase small fw-bold">Autenticación AWS</h6>
                    <i class="bi bi-shield-lock fs-4 text-warning"></i>
                </div>
                <h3 class="fw-bold" id="aws-status-text">Conectado</h3>
                <div class="d-flex align-items-center mt-2">
                    <span class="status-indicator status-connected" id="aws-dot"></span>
                    <small class="text-muted" id="aws-msg">Token válido</small>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card status-card shadow-sm p-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h6 class="text-muted text-uppercase small fw-bold">Expiración Token</h6>
                    <i class="bi bi-clock fs-4 text-primary"></i>
                </div>
                <h3 class="fw-bold" id="timer-display">59:42</h3>
                <div class="token-timer-container">
                    <div class="token-bar" id="token-progress" style="width: 90%"></div>
                </div>
            </div>
        </div>
      </div>
      
      <!-- ... Resto del contenido ... -->
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/script.js"></script> 
  <script src="./js/config.js"></script>
</body>
</html>
